# ─────────────────────────────────────────────────────────────────────
# Netlify build configuration for Nerochaze Creative Labs
# ─────────────────────────────────────────────────────────────────────
[build]
  # 1. Enable pnpm via Corepack (built into Node 20+)
  # 2. Install workspace dependencies
  # 3. Build the web artifact
  command = "corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/nerochaze-web run build"
  publish = "artifacts/nerochaze-web/dist/public"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV     = "production"
  # BASE_PATH is "/" on Netlify — assets are served from the domain root
  BASE_PATH    = "/"

# ─────────────────────────────────────────────────────────────────────
# SPA fallback — hash routing (#/tool/...) works without this,
# but keeping it here ensures direct URL loads still work if routing
# ever switches to path-based in the future.
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─────────────────────────────────────────────────────────────────────
# Security & caching headers
# ─────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
