# ─────────────────────────────────────────────────────────────────────
# Netlify build configuration for Nerochaze Creative Labs
# ─────────────────────────────────────────────────────────────────────
[build]
  # Netlify's own install step (runs before this command) will use the
  # pnpm-lock.yaml it finds in the repo root.
  # This command only runs the actual Vite build after install succeeds.
  command = "pnpm --filter @workspace/nerochaze-web run build"
  publish = "artifacts/nerochaze-web/dist/public"

[build.environment]
  NODE_VERSION = "20"
  # BASE_PATH is "/" on Netlify — assets are served from the domain root.
  BASE_PATH = "/"
  # IMPORTANT: Do NOT set NODE_ENV=production here.
  # pnpm skips devDependencies when NODE_ENV=production, but the Vite
  # build needs them (vite, react, tailwind etc. are all devDeps).
  # Netlify sets NODE_ENV=production itself at a lower level; leaving it
  # out of this block lets pnpm install ALL dependencies correctly.

# ─────────────────────────────────────────────────────────────────────
# SPA fallback — required so refreshing a deep URL serves index.html
# instead of a 404 (hash routing also benefits from this safety net).
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─────────────────────────────────────────────────────────────────────
# Security & caching headers
# ─────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
