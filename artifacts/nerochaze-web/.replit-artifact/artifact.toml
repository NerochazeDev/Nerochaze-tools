kind = "web"
previewPath = "/nerochaze-web/"
title = "Nerochaze Creative Labs — Web"
version = "1.0.0"
id = "artifacts/nerochaze-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nerochaze-web/" ]
localPort = 22223

[services.development]
run = "pnpm --filter @workspace/nerochaze-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nerochaze-web", "run", "build" ]
publicDir = "artifacts/nerochaze-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22223"
BASE_PATH = "/nerochaze-web/"
